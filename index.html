<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EP Art Studio | Coastal Collection</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="site-header">
  <div class="container nav">
    <a href="#top" class="brand">
      <span class="brand-title">EP Art Studio</span>
      <span class="brand-sub">Estelle Pieters</span>
    </a>
    <nav class="menu">
      <a href="#about">About</a>
      <a href="#studio">Studio</a>
      <a href="#gallery">Gallery</a>
      <a href="#pottery">Pottery</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>

<main id="top">

<section class="hero section">
  <div class="container hero-inner">
    <h1>EP Art Studio</h1>
    <p class="hero-lead">Capturing light, colour, and the poetry of the sea.</p>
  </div>
</section>

<section id="gallery" class="section">
  <div class="container">
    <div class="gallery-grid">

      <!-- FIXED OYSTER CATCHERS -->
      <figure class="art-card">
        <img src="https://res.cloudinary.com/dqqyitjmb/image/upload/v1775461001/5_nx3hpr.png">
        <figcaption>
          <strong>Oyster Catcher 1.0</strong>
          <span class="price">Sold</span>
        </figcaption>
      </figure>

      <figure class="art-card">
        <img src="https://res.cloudinary.com/dqqyitjmb/image/upload/v1775461001/6_s1kiby.png">
        <figcaption>
          <strong>Oyster Catcher 2.0</strong>
          <span class="price">R1800</span>
        </figcaption>
      </figure>

    </div>
  </div>
</section>

<section id="pottery" class="section">
  <div class="container">

    <div class="pottery-slider">
      <button class="slider-btn prev">‹</button>

      <div class="pottery-track">
        <img src="https://res.cloudinary.com/dqqyitjmb/image/upload/v1777789895/EstellePieters_Art_Portfolio.pdf_xlbauy.jpg">
        <img src="https://res.cloudinary.com/dqqyitjmb/image/upload/v1775817685/1000034580_pmsbzs.jpg">
        <img src="https://res.cloudinary.com/dqqyitjmb/image/upload/v1775817684/1000034565_f2qovn.jpg">
      </div>

      <button class="slider-btn next">›</button>
    </div>

  </div>
</section>

</main>

<footer class="footer">
  © <span id="year"></span> EP Art Studio
</footer>

<script src="script.js"></script>

</body>
</html>
